name: Email Follow-up Cron

on:
  schedule:
    - cron: '0 14 * * *' # Cada día a las 14:00 UTC (09:00 Colombia)
  workflow_dispatch:

jobs:
  followup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Email Follow-up API
        run: |
          SITE_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}"
          CRON_SECRET="${{ secrets.CRON_SECRET }}"
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::warning::Secrets no configurados. Saltando email-followup."
            exit 0
          fi
          curl -X GET "${SITE_URL}/api/cron/email-followup" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -f

name: Check LLM Quotas

on:
  schedule:
    - cron: '0 */6 * * *' # Cada 6 horas
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Check Limits API
        run: |
          curl -X POST "${{ secrets.NEXT_PUBLIC_SITE_URL }}/api/cron/check-limits" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -f

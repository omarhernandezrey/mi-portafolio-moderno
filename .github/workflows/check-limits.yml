name: Check LLM Quotas

on:
  schedule:
    - cron: '0 */6 * * *' # Cada 6 horas
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Check Limits API
        run: |
          SITE_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}"
          CRON_SECRET="${{ secrets.CRON_SECRET }}"
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::warning::Secrets no configurados. Saltando check-limits."
            exit 0
          fi
          curl -X POST "${SITE_URL}/api/cron/check-limits" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -f

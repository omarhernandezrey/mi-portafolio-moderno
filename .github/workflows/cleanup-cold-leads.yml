name: Cleanup Cold Leads

on:
  schedule:
    - cron: '0 0 * * *' # 00:00 UTC (19:00 Colombia del día anterior)
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cleanup Cold Leads API
        run: |
          curl -X GET "${{ secrets.NEXT_PUBLIC_SITE_URL }}/api/cron/cleanup-cold-leads" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -f

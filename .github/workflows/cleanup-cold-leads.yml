name: Cleanup Cold Leads

on:
  schedule:
    - cron: '0 0 * * *' # 00:00 UTC (19:00 Colombia del día anterior)
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cleanup Cold Leads API
        run: |
          SITE_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}"
          CRON_SECRET="${{ secrets.CRON_SECRET }}"
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::warning::Secrets no configurados. Saltando cleanup-cold-leads."
            exit 0
          fi
          curl -X GET "${SITE_URL}/api/cron/cleanup-cold-leads" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -f

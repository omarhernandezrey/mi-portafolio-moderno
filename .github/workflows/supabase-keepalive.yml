name: Supabase Keep-Alive

on:
  schedule:
    # Diario: el free tier pausa a los 7 días de inactividad; con el ping
    # semanal anterior un solo fallo (ej. caída de runners el 9 jun) dejaba
    # pasar 14 días entre pings exitosos y el proyecto se pausaba.
    - cron: '0 13 * * *' # Todos los días 13:00 UTC (08:00 Colombia)
  workflow_dispatch: # Permite ejecución manual

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          # -f: falla con HTTP >=400 (antes un 540 de proyecto pausado salía en verde)
          # --retry: tolera fallos transitorios de red
          curl -sf --retry 3 --retry-delay 10 \
            "${{ secrets.SUPABASE_URL }}/rest/v1/conversations?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -o /dev/null -w "HTTP %{http_code}\n"

name: Daily Summary Bot

on:
  schedule:
    - cron: '0 13 * * *' # 13:00 UTC (08:00 Colombia)
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Daily Summary API
        run: |
          SITE_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}"
          CRON_SECRET="${{ secrets.CRON_SECRET }}"
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::warning::Secrets no configurados. Saltando daily-summary."
            exit 0
          fi
          curl -X GET "${SITE_URL}/api/cron/daily-summary" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -f

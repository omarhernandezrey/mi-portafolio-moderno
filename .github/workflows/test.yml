name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-integration:
    name: Unit & Integration Tests (Jest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests unitarios e integración
        run: npm run test:ci
        env:
          # Variables mínimas para que los mocks no fallen por schema de zod
          GROQ_API_KEY: test-key
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
          TELEGRAM_BOT_TOKEN: 0000000000:AAtest
          TELEGRAM_CHAT_ID: '12345'
          ADMIN_PASSWORD: testpassword
          ADMIN_SECRET: test-admin-secret-long
          CRON_SECRET: test-cron-secret-long

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build de producción
    runs-on: ubuntu-latest
    needs: unit-integration

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GROQ_API_KEY: test-key
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
          TELEGRAM_BOT_TOKEN: 0000000000:AAtest
          TELEGRAM_CHAT_ID: '12345'
          ADMIN_PASSWORD: testpassword
          ADMIN_SECRET: test-admin-secret-long
          CRON_SECRET: test-cron-secret-long
          NEXT_PUBLIC_CALCOM_INTERVIEW_URL: https://cal.com/test/entrevista
          NEXT_PUBLIC_CALCOM_CONSULT_URL: https://cal.com/test/consulta
          NEXT_PUBLIC_WHATSAPP_NUMBER: '573000000000'
          NEXT_PUBLIC_SITE_URL: https://test.com

  security:
    name: Auditoría de seguridad
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: npm audit (HIGH y CRITICAL)
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

      - name: Verificar anti-hardcoding
        run: bash scripts/check-no-hardcode.sh

      - name: Verificar secretos en staged files
        run: |
          git diff --name-only HEAD~1 HEAD | xargs -I{} sh -c \
          'grep -lE "(gsk_|nvapi-|eyJ[A-Za-z0-9]{20,})" {} 2>/dev/null && echo "⚠️ Posible secreto en {}" || true'

  e2e:
    name: Tests E2E (Cypress)
    runs-on: ubuntu-latest
    needs: build
    # Solo corre en push a main, no en cada PR para ahorrar minutos de CI
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Construir aplicación
        run: npm run build
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'test-key' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://test.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'test-service-role-key' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'test-anon-key' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || '0000000000:AAtest' }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || '12345' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'testpassword' }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET || 'test-admin-secret-long' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET || 'test-cron-secret-long' }}
          NEXT_PUBLIC_CALCOM_INTERVIEW_URL: ${{ secrets.NEXT_PUBLIC_CALCOM_INTERVIEW_URL || 'https://cal.com/test/entrevista' }}
          NEXT_PUBLIC_CALCOM_CONSULT_URL: ${{ secrets.NEXT_PUBLIC_CALCOM_CONSULT_URL || 'https://cal.com/test/consulta' }}
          NEXT_PUBLIC_WHATSAPP_NUMBER: ${{ secrets.NEXT_PUBLIC_WHATSAPP_NUMBER || '573000000000' }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://test.com' }}

      - name: Iniciar servidor
        run: npm start &
        env:
          PORT: 3000

      - name: Esperar a que el servidor esté listo
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Ejecutar Cypress
        run: npx cypress run --spec "cypress/e2e/chatbot.cy.ts"

      - name: Subir screenshots si fallan tests
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 3
